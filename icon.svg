<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="96" fill="#e8dfd0"/>
  <!-- Cat face centered -->
  <g transform="translate(256, 280) scale(2.8)">
    <!-- Ears (round) -->
    <ellipse cx="-32" cy="-58" rx="14" ry="18" fill="#f0c878"/>
    <ellipse cx="-32" cy="-60" rx="9" ry="12" fill="#ffbbcc"/>
    <ellipse cx="32" cy="-58" rx="14" ry="18" fill="#f0c878"/>
    <ellipse cx="32" cy="-60" rx="9" ry="12" fill="#ffbbcc"/>
    <!-- Head -->
    <circle cx="0" cy="-28" r="40" fill="#f0c878"/>
    <!-- Face lighter area -->
    <ellipse cx="0" cy="-20" rx="30" ry="26" fill="#fce8c0"/>
    <!-- Forehead stripes -->
    <path d="M-8 -50 L-4 -40" stroke="#e0b050" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
    <path d="M0 -52 L0 -42" stroke="#e0b050" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
    <path d="M8 -50 L4 -40" stroke="#e0b050" stroke-width="2.5" stroke-linecap="round" opacity="0.35"/>
    <!-- Eyes (relaxed lines) -->
    <line x1="-17" y1="-30" x2="-6" y2="-30" stroke="#3a3530" stroke-width="2.8" stroke-linecap="round"/>
    <line x1="6" y1="-30" x2="17" y2="-30" stroke="#3a3530" stroke-width="2.8" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="-20" cy="-20" rx="7" ry="4" fill="rgba(255,150,150,0.35)"/>
    <ellipse cx="20" cy="-20" rx="7" ry="4" fill="rgba(255,150,150,0.35)"/>
    <!-- Nose -->
    <ellipse cx="0" cy="-22" rx="3.5" ry="2.5" fill="#ffaaaa"/>
    <!-- Mouth -->
    <path d="M0 -19.5 L0 -17" stroke="#c08870" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M-7 -16 Q-3.5 -12, 0 -17 Q3.5 -12, 7 -16" stroke="#c08870" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Whiskers -->
    <line x1="-40" y1="-28" x2="-22" y2="-24" stroke="#c8a870" stroke-width="1.2" opacity="0.5"/>
    <line x1="-42" y1="-20" x2="-23" y2="-20" stroke="#c8a870" stroke-width="1.2" opacity="0.5"/>
    <line x1="-40" y1="-12" x2="-22" y2="-16" stroke="#c8a870" stroke-width="1.2" opacity="0.5"/>
    <line x1="40" y1="-28" x2="22" y2="-24" stroke="#c8a870" stroke-width="1.2" opacity="0.5"/>
    <line x1="42" y1="-20" x2="23" y2="-20" stroke="#c8a870" stroke-width="1.2" opacity="0.5"/>
    <line x1="40" y1="-12" x2="22" y2="-16" stroke="#c8a870" stroke-width="1.2" opacity="0.5"/>
    <!-- Body hint at bottom -->
    <ellipse cx="0" cy="14" rx="32" ry="18" fill="#f0c878"/>
    <ellipse cx="0" cy="18" rx="20" ry="12" fill="#fce8c0"/>
    <!-- Paws -->
    <ellipse cx="-14" cy="28" rx="8" ry="5" fill="#f0c878"/>
    <ellipse cx="14" cy="28" rx="8" ry="5" fill="#f0c878"/>
    <circle cx="-14" cy="29" r="1.5" fill="#ffb0aa"/>
    <circle cx="14" cy="29" r="1.5" fill="#ffb0aa"/>
  </g>
</svg>
